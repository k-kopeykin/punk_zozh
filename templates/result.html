<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <main class="intro-container">

        <!-- Заголовок -->

        <section class="message-block">

            <h1 class="manifesto-title">
                Ну что, картина примерно такая:
            </h1>

        </section>

        <!-- Результаты -->

        <section class="results-block">

            <!-- Один блок результата -->

            <div class="result-card">

                <p>
                    {{results[0]}}
                </p>

            </div>

            <!-- Следующий блок -->

            <div class="result-card">

                <p>
                    {{results[1]}}
                </p>

            </div>

            <!-- И так далее -->

            <div class="result-card">

                <p>
                    {{results[2]}}
                </p>

            </div>


            <div class="result-card">

                <p>
                    {{results[3]}}
                </p>

            </div>


        </section>

        <!-- Микро-действие -->

        <section class="message-block">

            <p class="habit-title">
                Попробуй сегодня:
            </p>

            <p>
                Дойти до дальнего магазина вместо ближайшего.
            </p>

        </section>

        <!-- Кнопки -->

        <section class="buttons-block">

            <a href="#" class="primary-button">
                Сохранить результат
            </a>

            <a href="/" class="secondary-button">
                На главную
            </a>

        </section>

    </main>

</body>
</html>
