{% extends "base.html" %}

{% block title %}Результат | Панк-ЗОЖ{% endblock %}

{% block content %}
    <section class="message-block">
        <h1 class="manifesto-title">Ну что, картина примерно такая:</h1>
    </section>

    <section class="results-block">
        <div class="result-card">
            {% for result in results %}
                <p>{{ result }}</p>
            {% endfor %}
        </div>
    </section>

    <section class="message-block">
        <p class="habit-title">Попробуй сегодня:</p>
        <p>{{ action }}</p>
    </section>

    <section class="buttons-block dual-buttons">
        <a href="/checkin" class="primary-button">Проверить себя ещё раз</a>
        <div class="small-buttons">
            <a href="/" class="secondary-button small-button">На главную</a>
            <a href="/articles" class="secondary-button small-button">Почитать</a>
        </div>
    </section>
{% endblock %}
