<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <main class="intro-container">

        <section class="message-block">

            <h1 class="manifesto-title">
                Быстро сверимся с реальностью
            </h1>

        </section>

        <!-- Питание -->

        <section class="question-block">

            <h2>Ел сегодня?</h2>

            <div class="answers">

                <button class="answer-button">
                    Кофе — тоже завтрак
                </button>

                <button class="answer-button">
                    Живу на перекусах
                </button>

                <button class="answer-button">
                    Днём голодно, вечером жор
                </button>

                <button class="answer-button">
                    Питаюсь хорошо — организм не жалуется
                </button>

            </div>

        </section>

        <!-- Сон -->

        <section class="question-block">

            <h2>Как спалось?</h2>

            <div class="answers">

                <button class="answer-button">
                    Что такое сон?
                </button>

                <button class="answer-button">
                    Ложусь поздно, встаю рано
                </button>

                <button class="answer-button">
                    В выходные отсыпаюсь
                </button>

                <button class="answer-button">
                    Не нарушаю режим!
                </button>

            </div>

        </section>

        <!-- Активность -->

        <section class="question-block">

            <h2>Шевелишься вообще?</h2>

            <div class="answers">

                <button class="answer-button">
                    Лежу, не жужжу
                </button>

                <button class="answer-button">
                    Двигаюсь в приступах мотивации
                </button>

                <button class="answer-button">
                    Эпизодический физкультурник
                </button>

                <button class="answer-button">
                    Ржаветь не собираюсь!
                </button>

            </div>

        </section>

        <!-- Эмоции -->

        <section class="question-block">

            <h2>Как держишься?</h2>

            <div class="answers">

                <button class="answer-button">
                    На морально-волевых
                </button>

                <button class="answer-button">
                    Держусь, назло врагам
                </button>

                <button class="answer-button">
                    В пределах нормы
                </button>

                <button class="answer-button">
                    Даже жить хочется
                </button>

            </div>

        </section>

        <!-- Кнопка -->

        <section class="buttons-block">

            <a href="/result" class="primary-button">
                Поехали
            </a>

        </section>

    </main>

</body>
</html>
