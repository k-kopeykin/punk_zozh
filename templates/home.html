{% extends "base.html" %}

{% block title %}Главная | Панк-ЗОЖ{% endblock %}

{% block content %}
    <section class="message-block">
        <h1 class="manifesto-title">Статус системы:</h1>
        <p>Организм работает на морально-волевых. <br>Вот твоё микро-ТО на сегодня:</p>
    </section>

    <section class="results-block">
        <div class="result-card">
            <p class="habit-title" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem;">
                {{ action }}
            </p>
        </div>
    </section>

    <section class="buttons-block dual-buttons">
        <a href="/acknowledge?status=done" class="primary-button" onclick="recordActionDone()">Сделано! Пиу-пиу</a>
        <a href="/acknowledge?status=skip" class="secondary-button">Пожалуй, нет</a>
    </section>

    

    <section class="buttons-block" style="flex-direction: column; gap: 1rem;">
        
        
        <div class="small-buttons" style="justify-content: center; margin-top: 1rem;">
            <a href="/articles" class="secondary-button small-button">Почитать</a>
        </div>    
    </section>
{% endblock %}
